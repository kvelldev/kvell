AWSTemplateFormatVersion: "2010-09-09"
Description: Kvell S3 Storage Stack (Scripts, Backups, SPA)

Parameters:
  EnvironmentName:
    Type: String
    Default: kvell-prod
    Description: Environment name prefix

Resources:
  # S3 Bucket for Setup Scripts
  ScriptsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${EnvironmentName}-scripts"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # S3 Bucket for Backups
  BackupBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${EnvironmentName}-backups"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldBackups
            Status: Enabled
            ExpirationInDays: 180

  # S3 Bucket for Logs (CloudFront)
  LogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${EnvironmentName}-logs"
      AccessControl: LogDeliveryWrite
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldLogs
            Status: Enabled
            ExpirationInDays: 180

Outputs:
  ScriptsBucketName:
    Description: S3 bucket for setup scripts
    Value: !Ref ScriptsBucket
    Export:
      Name: !Sub "${EnvironmentName}-scripts-bucket"

  BackupBucketName:
    Description: S3 bucket for MongoDB backups
    Value: !Ref BackupBucket
    Export:
      Name: !Sub "${EnvironmentName}-backup-bucket"

  LogsBucketName:
    Description: S3 bucket for CloudFront logs
    Value: !Ref LogsBucket
    Export:
      Name: !Sub "${EnvironmentName}-logs-bucket"

  LogsBucketDomainName:
    Description: Domain name of the logs bucket
    Value: !GetAtt LogsBucket.DomainName
    Export:
      Name: !Sub "${EnvironmentName}-logs-bucket-domain"
