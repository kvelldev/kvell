AWSTemplateFormatVersion: "2010-09-09"
Description: Kvell Production EC2 Instance with Docker

Parameters:
  EnvironmentName:
    Type: String
    Default: kvell-prod
    Description: Environment name prefix

  InstanceType:
    Type: String
    Default: t3.small
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
    Description: EC2 instance type (t3.small recommended for MongoDB)

  KeyPairName:
    Type: String
    Default: ""
    Description: EC2 Key Pair for SSH access (optional, SSM recommended)

  GitHubRepo:
    Type: String
    Default: your-org/kvell
    Description: GitHub repository (owner/repo format, e.g., your-org/kvell)

  CorsOrigins:
    Type: String
    Default: https://kvellapp.com
    Description: CORS allowed origins

  BackupS3Bucket:
    Type: String
    Description: S3 bucket for MongoDB backups

  DataVolumeSize:
    Type: Number
    Default: 10
    Description: Size of data EBS volume in GB (for MongoDB)

  # Dynamic AMI using SSM Parameter Store
  LatestUbuntuAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/canonical/ubuntu/server/22.04/stable/current/amd64/hvm/ebs-gp2/ami-id
    Description: SSM Parameter for latest Ubuntu 22.04 AMI

  # CloudFront Managed Prefix List ID (for restricting SG to CloudFront only)
  # Get this from: aws ec2 describe-managed-prefix-lists --filters "Name=prefix-list-name,Values=com.amazonaws.global.cloudfront.origin-facing"
  CloudFrontPrefixListId:
    Type: String
    Default: pl-58a04531  # ap-northeast-1 CloudFront prefix list
    Description: CloudFront managed prefix list ID for security group

Conditions:
  HasKeyPair: !Not [!Equals [!Ref KeyPairName, ""]]

Resources:
  # Security Group
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Kvell production instance security group
      VpcId:
        Fn::ImportValue: !Sub "${EnvironmentName}-vpc-id"
      SecurityGroupIngress:
        # HTTP from CloudFront only (using AWS managed prefix list)
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          SourcePrefixListId: !Ref CloudFrontPrefixListId
          Description: FastAPI from CloudFront only
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-sg"

  # IAM Role for EC2
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentName}-instance-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: KvellInstancePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # ECR Access for pulling images
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: "*"
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                Resource: !Sub "arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/kvell-api"
              # S3 Access for backups
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub "arn:aws:s3:::${BackupS3Bucket}/*"
              # SSM Parameter Store for GitHub token
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/kvell/*"
              # EC2 Volume Access for attaching data volume
              - Effect: Allow
                Action:
                  - ec2:AttachVolume
                  - ec2:DescribeVolumes
                Resource: "*"

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

  # Data EBS Volume (survives instance replacement)
  DataVolume:
    Type: AWS::EC2::Volume
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      AvailabilityZone: !Select [0, !GetAZs ""]
      Size: !Ref DataVolumeSize
      VolumeType: gp3
      Encrypted: true
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-data-volume"

  # EC2 Instance
  Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      AvailabilityZone: !Select [0, !GetAZs ""]
      SubnetId:
        Fn::ImportValue: !Sub "${EnvironmentName}-public-subnet-id"
      ImageId: !Ref LatestUbuntuAmiId
      IamInstanceProfile: !Ref InstanceProfile
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      KeyName: !If [HasKeyPair, !Ref KeyPairName, !Ref "AWS::NoValue"]
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 10
            VolumeType: gp3
            DeleteOnTermination: true  # OS volume can be deleted
      UserData:
        Fn::Base64: |
          #!/bin/bash
          set -euo pipefail

          readonly TARGET_USER="ubuntu"

          # logging settings
          LOG_FILE="/var/log/user-data.log"
          exec > >(tee -a "$LOG_FILE")
          exec 2>&1



          # utility functions
          mkdir -p /opt/scripts
          cat <<"EOF" > /opt/scripts/common-functions.sh
          error_exit() {
              echo "$(date): ERROR: $1" >&2
              exit 1
          }

          log_info() {
              echo "$(date): INFO: $1"
          }

          log_success() {
              echo "$(date): SUCCESS: $1"
          }

          command_exists() {
              command -v "$1" >/dev/null 2>&1
          }
          EOF
          source /opt/scripts/common-functions.sh

          # --------------------------------------------------------------------
          # system settings
          # --------------------------------------------------------------------

          setup_system() {
              log_info "Setting up system configuration..."

              # timezone
              timedatectl set-timezone Asia/Tokyo || error_exit "Failed to set timezone"
              log_success "Timezone set to Asia/Tokyo"

              # apt
              apt update -y && apt upgrade -y || error_exit "Failed to update packages"
              log_success "Packages updated"
          }

          install_essential_packages() {
              log_info "Installing essential packages..."

              local packages=(
                  git curl wget unzip build-essential sqlite3 gnupg
              )
              local packages4python_build=(
                  libbz2-dev libssl-dev libreadline-dev libffi-dev zlib1g-dev
                  libncurses5-dev libncursesw5-dev libsqlite3-dev libgdbm-dev
                  liblzma-dev tk-dev uuid-dev
              )

              apt install -y "${packages[@]}" || error_exit "Failed to install essential packages"
              apt install -y "${packages4python_build[@]}" || error_exit "Failed to install Python build dependencies"
              log_success "Essential packages installed"
          }

          # --------------------------------------------------------------------
          # AWS
          # --------------------------------------------------------------------

          install_aws_cli() {
              log_info "Installing AWS CLI..."

              if command_exists aws; then
                  log_success "AWS CLI already installed"
                  return 0
              fi

              local temp_dir="/tmp/aws-cli-install"
              mkdir -p "$temp_dir" && cd "$temp_dir"

              curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip" || error_exit "Failed to download AWS CLI"
              unzip awscliv2.zip || error_exit "Failed to extract AWS CLI"
              ./aws/install || error_exit "Failed to install AWS CLI"

              rm -rf "$temp_dir"
              log_success "AWS CLI installed"
          }

          install_ssm_agent() {
              log_info "Installing SSM Agent..."

              if snap list | grep -q amazon-ssm-agent; then
                  log_success "SSM Agent already installed"
                  return 0
              fi

              snap install amazon-ssm-agent --classic || error_exit "Failed to install SSM Agent"
              snap start amazon-ssm-agent || error_exit "Failed to start SSM Agent"
              log_success "SSM Agent installed and started"
          }

          # --------------------------------------------------------------------
          # Docker
          # --------------------------------------------------------------------

          install_docker() {
              log_info "Installing Docker..."

              if command_exists docker; then
                  log_success "Docker already installed"
                  return 0
              fi

              # Get docker gpg key (apt will use this key to verify the authenticity of the packages when installing docker)
              install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg || error_exit "Failed to add Docker GPG key"

              # Set up docker repository to apt sources (so that apt can fetch docker packagets from this repository)
              echo \
                "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
                https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" \
                | tee /etc/apt/sources.list.d/docker.list > /dev/null || error_exit "Failed to add Docker repository"

              # install docker
              apt update -y || error_exit "Failed to update package list for Docker"
              apt install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin || error_exit "Failed to install Docker"

              systemctl enable --now docker || error_exit "Failed to enable Docker service"
              usermod -aG docker "$TARGET_USER" || error_exit "Failed to add user to docker group"
              log_success "Docker installed and configured"
          }

          setup_backup() {
              log_info "Setting up backup script..."

              # Create backup script
              cat <<'EOF' > /opt/scripts/backup.sh
          #!/bin/bash
          # Kvell MongoDB Backup Script
          # Called by cron daily
          set -euo pipefail

          BACKUP_BUCKET="${BACKUP_BUCKET:-kvell-prod-backups}"
          TIMESTAMP=$(date +%Y%m%d-%H%M)
          CONTAINER_NAME="kvell-mongo-1"

          # Check if container is running
          if ! docker ps --format '{{.Names}}' | grep -q "^${CONTAINER_NAME}$"; then
              echo "$(date): Error - Container ${CONTAINER_NAME} is not running. Skipping backup."
              exit 1
          fi

          # Dump bonfires collection only
          docker exec ${CONTAINER_NAME} mongodump \
              --uri="mongodb://localhost:27017/kvell" \
              --collection=bonfires \
              --out=/tmp/backup

          # Upload to S3
          docker cp ${CONTAINER_NAME}:/tmp/backup/kvell/bonfires.bson /tmp/
          aws s3 cp /tmp/bonfires.bson "s3://${BACKUP_BUCKET}/bonfires-${TIMESTAMP}.bson"

          # Cleanup
          docker exec ${CONTAINER_NAME} rm -rf /tmp/backup
          rm -f /tmp/bonfires.bson

          echo "$(date): Backup completed - bonfires-${TIMESTAMP}.bson"
          EOF

              chmod +x /opt/scripts/backup.sh

              # Setup Cron (Daily)
              ln -sf /opt/scripts/backup.sh /etc/cron.daily/kvell-backup

              log_success "Backup script installed and scheduled"
          }

          main() {
              log_info "Starting EC2 UserData execution"


              setup_system

              install_essential_packages

              install_aws_cli
              install_ssm_agent

              install_docker

              setup_backup

              log_info "System is ready for use"
              echo "EC2 setup completed at $(date)" | tee /etc/motd

              # motd (Message of the Day)
              echo "Filtered user-data.log (INFO, SUCCESS, ERROR):" >> /etc/motd
              grep -E 'INFO|SUCCESS|ERROR' /var/log/user-data.log >> /etc/motd || echo "(No matching log entries)" >> /etc/motd


          }

          main "$@"
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-instance"

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref Instance

  PublicIp:
    Description: Public IP address (use for CloudFront origin)
    Value: !GetAtt Instance.PublicIp

  SecurityGroupId:
    Description: Security Group ID
    Value: !Ref InstanceSecurityGroup

  DataVolumeId:
    Description: Data EBS Volume ID (contains MongoDB data)
    Value: !Ref DataVolume
