AWSTemplateFormatVersion: "2010-09-09"
Description: Kvell Production EC2 Instance with Docker

Parameters:
  EnvironmentName:
    Type: String
    Default: kvell-prod
    Description: Environment name prefix

  InstanceType:
    Type: String
    Default: t3.small
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
    Description: EC2 instance type (t3.small recommended for MongoDB)

  KeyPairName:
    Type: String
    Default: ""
    Description: EC2 Key Pair for SSH access (optional, SSM recommended)

  GitHubRepo:
    Type: String
    Default: kvelldev/kvell
    Description: GitHub repository (owner/repo format, e.g., your-org/kvell)

  CorsOrigins:
    Type: String
    Default: https://kvellapp.com
    Description: CORS allowed origins

  ScriptsBucketName:
    Type: String
    Description: S3 bucket containing setup scripts (e.g. kvell-infra-scripts)

  BackupS3Bucket:
    Type: String
    Description: S3 bucket for MongoDB backups

  DataVolumeSize:
    Type: Number
    Default: 10
    Description: Size of data EBS volume in GB (for MongoDB)

  NotificationEmail:
    Type: String
    Description: Email address to receive CloudWatch alarm notifications


  # Dynamic AMI using SSM Parameter Store
  LatestUbuntuAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/canonical/ubuntu/server/22.04/stable/current/amd64/hvm/ebs-gp2/ami-id
    Description: SSM Parameter for latest Ubuntu 22.04 AMI

  # CloudFront Managed Prefix List ID (for restricting SG to CloudFront only)
  # Get this from: aws ec2 describe-managed-prefix-lists --filters "Name=prefix-list-name,Values=com.amazonaws.global.cloudfront.origin-facing"
  CloudFrontPrefixListId:
    Type: String
    Default: pl-58a04531  # ap-northeast-1 CloudFront prefix list
    Description: CloudFront managed prefix list ID for security group

Conditions:
  HasKeyPair: !Not [!Equals [!Ref KeyPairName, ""]]

Resources:
  # Security Group
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Kvell production instance security group
      VpcId:
        Fn::ImportValue: !Sub "${EnvironmentName}-vpc-id"
      SecurityGroupIngress:
        # HTTP from CloudFront only (using AWS managed prefix list)
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          SourcePrefixListId: !Ref CloudFrontPrefixListId
          Description: FastAPI from CloudFront only
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-sg"

  # IAM Role for EC2
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentName}-instance-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
      # ... (AssumeRolePolicyDocument continued)
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: KvellInstancePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # S3 Access for backups and scripts
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource:
                  - !Sub "arn:aws:s3:::${BackupS3Bucket}/*"
                  - !Sub "arn:aws:s3:::${ScriptsBucketName}/*"
              # SSM Parameter Store for GitHub token
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource:
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/kvell/*"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/kvell/prod/github_pat"
              # EC2 Volume Access for attaching data volume
              - Effect: Allow
                Action:
                  - ec2:AttachVolume
                  - ec2:DescribeVolumes
                Resource: "*"

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

  # Elastic IP for Instance (Fixed IP for CloudFront Origin)
  InstanceEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-eip"

  EIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      InstanceId: !Ref Instance
      AllocationId: !GetAtt InstanceEIP.AllocationId

  # Data EBS Volume (survives instance replacement)
  DataVolume:
    Type: AWS::EC2::Volume
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      AvailabilityZone: !Select [0, !GetAZs ""]
      Size: !Ref DataVolumeSize
      VolumeType: gp3
      Encrypted: true
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-data-volume"

  DataVolumeAttachment:
    Type: AWS::EC2::VolumeAttachment
    Properties:
      Device: /dev/sdf
      InstanceId: !Ref Instance
      VolumeId: !Ref DataVolume

  # EC2 Instance
  Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      AvailabilityZone: !Select [0, !GetAZs ""]
      SubnetId:
        Fn::ImportValue: !Sub "${EnvironmentName}-public-subnet-id"
      ImageId: !Ref LatestUbuntuAmiId
      IamInstanceProfile: !Ref InstanceProfile
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      KeyName: !If [HasKeyPair, !Ref KeyPairName, !Ref "AWS::NoValue"]
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 30
            VolumeType: gp3
            DeleteOnTermination: true  # OS volume can be deleted
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euo pipefail

          # ------------------------------------------------------------------
          # Configuration
          # ------------------------------------------------------------------
          SCRIPT_BUCKET="${ScriptsBucketName}"
          SCRIPT_KEY="setup-prod.sh"
          BACKUP_BUCKET_NAME="${BackupS3Bucket}"
          LOG_FILE="/var/log/user-data-bootstrap.log"

          exec > >(tee -a "$LOG_FILE")
          exec 2>&1

          echo "$(date): Starting Bootstrap..."

          # 1. Install AWS CLI
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y awscli

          # 2. Download setup script from S3
          echo "$(date): Downloading setup script from s3://${!SCRIPT_BUCKET}/${!SCRIPT_KEY}..."
          aws s3 cp "s3://${!SCRIPT_BUCKET}/${!SCRIPT_KEY}" /opt/setup.sh || {
              echo "$(date): Failed to download setup script" >&2
              exit 1
          }

          # 3. Make executable
          chmod +x /opt/setup.sh

          # 4. Execute script with environment variables
          export BACKUP_BUCKET="${!BACKUP_BUCKET_NAME}"
          export CORS_ORIGINS="${CorsOrigins}"

          echo "$(date): Executing setup script..."
          /opt/setup.sh

          echo "$(date): Bootstrap finished."
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-instance"

  # ------------------------------------------------------------------
  # Monitoring & Alerting
  # ------------------------------------------------------------------
  MonitoringTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${EnvironmentName}-monitoring-topic"

  MonitoringSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: !Ref NotificationEmail
      Protocol: email
      TopicArn: !Ref MonitoringTopic

  # 1. Death Check (Status Check Failed)
  # Alarm if StatusCheckFailed >= 1 for 1 minute
  StatusCheckAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${EnvironmentName}-death-check"
      AlarmDescription: "Alarm when EC2 Status Check fails (instance unresponsive)"
      Namespace: AWS/EC2
      MetricName: StatusCheckFailed
      Dimensions:
        - Name: InstanceId
          Value: !Ref Instance
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref MonitoringTopic
      OKActions:
        - !Ref MonitoringTopic

  # 2. CPU High (CPU Utilization > 80%)
  # Alarm if CPU > 80% for 5 minutes (Basic Monitoring period)
  CPUHighAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${EnvironmentName}-cpu-high"
      AlarmDescription: "Alarm when CPU exceeds 80%"
      Namespace: AWS/EC2
      MetricName: CPUUtilization
      Dimensions:
        - Name: InstanceId
          Value: !Ref Instance
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 80
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref MonitoringTopic
      OKActions:
        - !Ref MonitoringTopic

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref Instance

  PublicIp:
    Description: Public IP address (EIP)
    Value: !Ref InstanceEIP

  SecurityGroupId:
    Description: Security Group ID
    Value: !Ref InstanceSecurityGroup

  DataVolumeId:
    Description: Data EBS Volume ID (contains MongoDB data)
    Value: !Ref DataVolume

  PublicDnsName:
    Description: Public DNS name of the instance
    Value: !GetAtt Instance.PublicDnsName
