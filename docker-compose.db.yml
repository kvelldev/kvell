# Kvell Database Docker Compose
# MongoDB + Redis only (API runs natively via systemd)

services:
  mongo:
    image: mongo:7.0
    container_name: kvell-mongo
    restart: unless-stopped
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27017:27017"
    volumes:
      - /data/mongo:/data/db
    healthcheck:
      test: |
        test $$(mongosh --quiet --eval "try { rs.initiate({_id:'rs0', members:[{_id:0, host:'localhost:27017'}]}).ok } catch(e) { rs.status().ok }") -eq 1
      interval: 10s
      start_period: 5s

  redis:
    image: redis:alpine
    container_name: kvell-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
